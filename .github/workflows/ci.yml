name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match the python versions listed in pyproject.toml classifiers.
        python: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv (matches CONTRIBUTING.md dev flow)
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff (lint)
        run: .venv/bin/ruff check src/torii_backend tests

      - name: Mypy (strict types)
        # mypy is in [dev] extras. The generated/ subdir is excluded via
        # pyproject.toml [tool.ruff].extend-exclude — mypy honors its own
        # exclude config block, which is set in pyproject.toml.
        run: .venv/bin/mypy src/torii_backend

      - name: Pytest
        run: .venv/bin/pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify wheel installs cleanly
        run: |
          python -m venv /tmp/verify-venv
          /tmp/verify-venv/bin/pip install dist/*.whl
          /tmp/verify-venv/bin/python -c "import torii_backend; print(torii_backend.__name__)"
